<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Study OS" />
  <meta name="description" content="Your personal study focus terminal" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Study OS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a26;
      --border: #1e1e2e;
      --text: #e0e0f0;
      --muted: #44445a;
      --physics: #3b9eff;
      --chemistry: #ff6b6b;
      --maths: #ffd166;
      --biology: #06d6a0;
      --english: #c77dff;
      --other: #888;
      --green: #06d6a0;
      --red: #ff6b6b;
      --blue: #3b9eff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* Header */
    .header {
      padding: 16px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header-title { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -1px; }
    .header-sub { font-size: 10px; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; font-family: 'Share Tech Mono', monospace; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
    .status-dot.active { background: var(--green); box-shadow: 0 0 12px var(--green); }
    .status-label { font-size: 10px; color: var(--muted); font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; }
    .status-wrap { display: flex; align-items: center; gap: 6px; }

    /* Tabs */
    .tabs { display: flex; padding: 14px 20px 0; gap: 2px; flex-shrink: 0; }
    .tab {
      flex: 1; padding: 9px 4px; font-size: 11px; border: none; cursor: pointer;
      background: transparent; color: var(--muted);
      border-bottom: 2px solid transparent;
      font-family: 'Share Tech Mono', monospace; letter-spacing: 1px;
      transition: all 0.2s;
    }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* Content */
    .content { flex: 1; overflow-y: auto; padding: 18px 20px 20px; -webkit-overflow-scrolling: touch; }
    .content::-webkit-scrollbar { display: none; }

    /* Cards */
    .card { background: var(--surface); border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
    .label { font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; font-family: 'Share Tech Mono', monospace; margin-bottom: 8px; }

    /* Mode toggle */
    .mode-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; gap: 4px; margin-bottom: 16px; }
    .mode-btn {
      flex: 1; padding: 9px; font-size: 12px; border: none; cursor: pointer;
      background: transparent; color: var(--muted); border-radius: 7px;
      font-family: 'Syne', sans-serif; font-weight: 700; transition: all 0.2s;
    }
    .mode-btn.active { background: #1e3a5f; color: var(--blue); }

    /* Subject pills */
    .subjects { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .subject-pill {
      padding: 6px 13px; font-size: 12px; border-radius: 20px; cursor: pointer;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      font-family: 'Syne', sans-serif; font-weight: 700; transition: all 0.2s;
    }

    /* Countdown inputs */
    .cd-inputs { display: flex; gap: 8px; margin-bottom: 16px; }
    .cd-field { flex: 1; text-align: center; }
    .cd-field input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: #fff; font-size: 28px; text-align: center; padding: 12px 0;
      border-radius: 10px; font-family: 'Share Tech Mono', monospace;
    }
    .cd-field input:focus { outline: none; border-color: var(--blue); }
    .cd-field span { font-size: 10px; color: var(--muted); display: block; margin-top: 4px; font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; }

    /* Timer display */
    .timer-display { text-align: center; padding: 16px 0 20px; }
    .timer-num {
      font-size: 62px; font-weight: 900; color: #fff; letter-spacing: -3px;
      font-family: 'Share Tech Mono', monospace;
      transition: color 0.3s, text-shadow 0.3s;
    }
    .timer-num.running { color: var(--green); text-shadow: 0 0 40px #06d6a055; }
    .timer-subject { font-size: 12px; margin-top: 4px; font-weight: 700; letter-spacing: 2px; }

    /* Ring */
    .ring-wrap { position: relative; width: 200px; height: 200px; margin: 0 auto 16px; }
    .ring-wrap svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
    .ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
    .ring-time { font-size: 34px; font-weight: 900; color: #fff; font-family: 'Share Tech Mono', monospace; letter-spacing: -2px; }
    .ring-sub { font-size: 11px; font-weight: 700; letter-spacing: 2px; margin-top: 2px; }

    /* Controls */
    .controls { display: flex; gap: 10px; margin-bottom: 16px; }
    .btn-start {
      flex: 1; padding: 16px; font-size: 14px; font-weight: 900; letter-spacing: 3px;
      background: linear-gradient(135deg, var(--green), var(--blue));
      color: #0a0a0f; border: none; border-radius: 12px; cursor: pointer;
      font-family: 'Syne', sans-serif; transition: opacity 0.2s;
    }
    .btn-stop {
      flex: 1; padding: 16px; font-size: 14px; font-weight: 900; letter-spacing: 3px;
      background: linear-gradient(135deg, var(--red), var(--maths));
      color: #0a0a0f; border: none; border-radius: 12px; cursor: pointer;
      font-family: 'Syne', sans-serif;
    }
    .btn-reset {
      padding: 16px 18px; font-size: 18px; background: var(--surface);
      color: var(--muted); border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
    }

    /* Quick stats */
    .quick-stats { display: flex; justify-content: space-between; }
    .qs-item { text-align: center; flex: 1; }
    .qs-val { font-size: 18px; font-weight: 900; font-family: 'Share Tech Mono', monospace; }
    .qs-label { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 2px; font-family: 'Share Tech Mono', monospace; }

    /* Todo */
    .todo-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .todo-select {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 10px 8px; border-radius: 8px; font-size: 12px; font-family: 'Syne', sans-serif;
    }
    .todo-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border); color: #fff;
      padding: 10px 12px; border-radius: 8px; font-size: 13px; font-family: 'Syne', sans-serif;
    }
    .todo-input:focus, .todo-select:focus { outline: none; border-color: var(--blue); }
    .todo-add {
      background: #1e3a5f; border: 1px solid var(--blue); color: var(--blue);
      padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 18px; line-height: 1;
    }
    .todo-section-label { font-size: 10px; letter-spacing: 3px; font-family: 'Share Tech Mono', monospace; text-transform: uppercase; margin-bottom: 6px; }
    .todo-item {
      display: flex; align-items: center; gap: 10px; padding: 11px 13px;
      background: var(--surface); border-radius: 8px; margin-bottom: 6px;
      border-left: 3px solid transparent; transition: all 0.2s;
    }
    .todo-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .todo-text { flex: 1; font-size: 13px; color: var(--text); }
    .todo-text.done { color: var(--muted); text-decoration: line-through; }
    .todo-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 2px; }
    .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 40px 0; font-family: 'Share Tech Mono', monospace; }

    /* Blocker */
    .blocker-status { text-align: center; padding: 20px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); margin-bottom: 16px; transition: all 0.3s; }
    .blocker-status.on { border-color: #06d6a055; background: #06d6a00a; }
    .blocker-icon { font-size: 32px; margin-bottom: 8px; }
    .blocker-title { font-size: 13px; font-weight: 900; letter-spacing: 3px; margin-bottom: 4px; font-family: 'Share Tech Mono', monospace; }
    .blocker-sub { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
    .btn-toggle {
      padding: 10px 28px; font-size: 12px; font-weight: 900; letter-spacing: 2px;
      border-radius: 8px; cursor: pointer; font-family: 'Syne', sans-serif; border: 1px solid;
      transition: all 0.2s;
    }
    .app-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; margin-bottom: 6px; transition: all 0.2s;
    }
    .app-item.selected { border-color: #ff6b6b44; }
    .app-item-name { font-size: 13px; font-weight: 700; }
    .check-box {
      width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 12px;
      transition: all 0.2s; color: #fff; flex-shrink: 0;
    }
    .notice { background: #ff6b6b11; border: 1px solid #ff6b6b33; border-radius: 10px; padding: 14px; font-size: 12px; color: var(--red); text-align: center; margin-top: 12px; line-height: 1.6; }

    /* Stats */
    .stat-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .stat-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
    .stat-total { font-size: 24px; font-weight: 900; font-family: 'Share Tech Mono', monospace; }
    .bar-row { margin-bottom: 10px; }
    .bar-labels { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .bar-subj { font-size: 12px; font-weight: 700; }
    .bar-val { font-size: 12px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }
    .bar-bg { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .session-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 13px; background: var(--surface); border-radius: 8px; margin-bottom: 6px;
      border-left: 3px solid transparent;
    }
    .session-sub { font-size: 12px; font-weight: 700; }
    .session-date { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: 'Share Tech Mono', monospace; }
    .session-dur { font-size: 14px; font-weight: 900; font-family: 'Share Tech Mono', monospace; }

    /* Install banner */
    #install-banner {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: #1e3a5f; border-top: 1px solid var(--blue);
      padding: 14px 20px; z-index: 999; max-width: 480px; margin: 0 auto;
      align-items: center; gap: 12px;
    }
    #install-banner.show { display: flex; }
    #install-banner p { flex: 1; font-size: 13px; color: var(--text); }
    #install-btn { background: var(--blue); color: #fff; border: none; padding: 9px 18px; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; font-size: 13px; }
    #dismiss-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; }

    /* Gap util */
    .gap-16 { margin-bottom: 16px; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-sub">Focus Terminal</div>
      <div class="header-title">Study OS</div>
    </div>
    <div class="status-wrap">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusLabel">IDLE</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('timer')">⏱ Timer</button>
    <button class="tab" onclick="switchTab('todo')">✅ Tasks</button>
    <button class="tab" onclick="switchTab('blocker')">🔒 Block</button>
    <button class="tab" onclick="switchTab('stats')">📊 Stats</button>
  </div>

  <div class="content" id="content"></div>
</div>

<div id="install-banner">
  <p>📲 Install Study OS on your home screen!</p>
  <button id="install-btn">Install</button>
  <button id="dismiss-btn">×</button>
</div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────
const SUBJECTS = ["Physics","Chemistry","Maths","Biology","English","Other"];
const SUBJECT_COLORS = { Physics:"#3b9eff", Chemistry:"#ff6b6b", Maths:"#ffd166", Biology:"#06d6a0", English:"#c77dff", Other:"#888" };
const BLOCKED_APPS = ["Instagram","YouTube","Twitter/X","Snapchat","Reddit","WhatsApp","TikTok","Netflix"];

let state = {
  tab: "timer",
  timerMode: "flow",
  running: false,
  seconds: 0,
  subject: "Physics",
  cdH: 0, cdM: 25, cdS: 0,
  countdownTotal: 0,
  countdownLeft: 0,
  todos: [],
  blockedApps: [],
  blockActive: false,
  stats: {},
  sessions: [],
};

let interval = null;
let startEpoch = 0;

// ─── Persistence ────────────────────────────────────────────────────────────
function load() {
  try {
    const d = JSON.parse(localStorage.getItem("studyos_v2")) || {};
    state.stats = d.stats || {};
    state.sessions = d.sessions || [];
    state.todos = d.todos || [];
    state.blockedApps = d.blockedApps || [];
    state.blockActive = d.blockActive || false;
  } catch(e) {}
}
function save() {
  localStorage.setItem("studyos_v2", JSON.stringify({
    stats: state.stats, sessions: state.sessions, todos: state.todos,
    blockedApps: state.blockedApps, blockActive: state.blockActive
  }));
}

// ─── Helpers ────────────────────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,"0"); }
function fmtTime(s){ return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`; }
function fmtHM(s){ const h=Math.floor(s/3600), m=Math.floor((s%3600)/60); return h>0?`${h}h ${m}m`:`${m}m`; }
function todayKey(){ return new Date().toISOString().slice(0,10); }
function weekKey(){ const d=new Date(); d.setDate(d.getDate()-d.getDay()); return "W"+d.toISOString().slice(0,10); }
function yearKey(){ return "Y"+new Date().getFullYear(); }

// ─── Timer Logic ────────────────────────────────────────────────────────────
function startTimer() {
  if (state.timerMode === "countdown") {
    const total = state.cdH*3600 + state.cdM*60 + state.cdS;
    if (total === 0) return;
    state.countdownTotal = total;
    state.countdownLeft = total;
    state.seconds = 0;
  }
  startEpoch = Date.now() - state.seconds * 1000;
  state.running = true;
  interval = setInterval(tick, 500);
  render();
}
function tick() {
  const elapsed = Math.floor((Date.now() - startEpoch) / 1000);
  if (state.timerMode === "countdown") {
    const left = state.countdownTotal - elapsed;
    if (left <= 0) { stopTimer(state.countdownTotal); return; }
    state.countdownLeft = left;
    state.seconds = elapsed;
  } else {
    state.seconds = elapsed;
  }
  updateTimerDisplay();
}
function stopTimer(overrideSecs) {
  clearInterval(interval);
  state.running = false;
  const elapsed = overrideSecs !== undefined ? overrideSecs : state.seconds;
  if (elapsed >= 5) logSession(elapsed);
  state.seconds = 0;
  state.countdownLeft = 0;
  render();
}
function resetTimer() {
  clearInterval(interval);
  state.running = false;
  state.seconds = 0;
  state.countdownLeft = 0;
  render();
}
function logSession(secs) {
  const tKey=todayKey(), wKey=weekKey(), yKey=yearKey();
  const subj = state.subject;
  [tKey, wKey, yKey, "lifetime"].forEach(k => {
    if (!state.stats[k]) state.stats[k] = {};
    state.stats[k][subj] = (state.stats[k][subj]||0) + secs;
    state.stats[k].__total = (state.stats[k].__total||0) + secs;
  });
  state.sessions.unshift({ date: new Date().toISOString(), subject: subj, duration: secs });
  if (state.sessions.length > 200) state.sessions.pop();
  save();
}

// ─── Tab Switch ─────────────────────────────────────────────────────────────
function switchTab(t) {
  state.tab = t;
  document.querySelectorAll(".tab").forEach((el,i) => {
    el.classList.toggle("active", ["timer","todo","blocker","stats"][i] === t);
  });
  render();
}

// ─── Render ─────────────────────────────────────────────────────────────────
function render() {
  updateStatus();
  const c = document.getElementById("content");
  if (state.tab === "timer") c.innerHTML = renderTimer();
  else if (state.tab === "todo") c.innerHTML = renderTodo();
  else if (state.tab === "blocker") c.innerHTML = renderBlocker();
  else c.innerHTML = renderStats();
  attachEvents();
}

function updateStatus() {
  const dot = document.getElementById("statusDot");
  const lbl = document.getElementById("statusLabel");
  dot.classList.toggle("active", state.running);
  lbl.textContent = state.running ? "ACTIVE" : "IDLE";
  lbl.style.color = state.running ? "var(--green)" : "var(--muted)";
}

function updateTimerDisplay() {
  const numEl = document.getElementById("timerNum");
  const ringTime = document.getElementById("ringTime");
  const displaySecs = state.timerMode === "countdown" ? state.countdownLeft : state.seconds;
  if (numEl) { numEl.textContent = fmtTime(displaySecs); numEl.className = "timer-num" + (state.running?" running":""); }
  if (ringTime) {
    ringTime.textContent = fmtTime(displaySecs);
    const pct = state.countdownTotal > 0 ? ((state.countdownTotal - state.countdownLeft) / state.countdownTotal) : 0;
    const r = 90, circ = 2*Math.PI*r;
    const arc = document.getElementById("ringArc");
    if (arc) arc.style.strokeDashoffset = circ * (1 - pct);
  }
}

function renderTimer() {
  const todayStat = state.stats[todayKey()] || {};
  const weekStat = state.stats[weekKey()] || {};
  const lifeStat = state.stats["lifetime"] || {};
  const displaySecs = state.timerMode === "countdown" ? (state.running ? state.countdownLeft : state.countdownTotal || (state.cdH*3600+state.cdM*60+state.cdS)) : state.seconds;
  const pct = state.countdownTotal > 0 ? ((state.countdownTotal - state.countdownLeft)/state.countdownTotal*100) : 0;
  const r = 90, circ = 2*Math.PI*r;

  const subjectPills = SUBJECTS.map(s => {
    const c = SUBJECT_COLORS[s];
    const sel = s === state.subject;
    return `<button class="subject-pill" onclick="selectSubject('${s}')"
      style="border-color:${sel?c:'var(--border)'};background:${sel?c+'22':'transparent'};color:${sel?c:'var(--muted)'}">${s}</button>`;
  }).join("");

  const cdInputs = state.timerMode==="countdown" && !state.running ? `
    <div class="cd-inputs gap-16">
      <div class="cd-field">
        <input type="number" min=0 max=23 value="${state.cdH}" id="cdH" />
        <span>HRS</span>
      </div>
      <div class="cd-field">
        <input type="number" min=0 max=59 value="${state.cdM}" id="cdM" />
        <span>MIN</span>
      </div>
      <div class="cd-field">
        <input type="number" min=0 max=59 value="${state.cdS}" id="cdS" />
        <span>SEC</span>
      </div>
    </div>` : "";

  const ringDisplay = state.timerMode==="countdown" && state.running ? `
    <div class="ring-wrap">
      <svg width="200" height="200">
        <circle cx="100" cy="100" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="8"/>
        <circle id="ringArc" cx="100" cy="100" r="${r}" fill="none" stroke="var(--blue)" stroke-width="8"
          stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}" stroke-linecap="round"
          style="transition:stroke-dashoffset 0.5s"/>
      </svg>
      <div class="ring-center">
        <div class="ring-time" id="ringTime">${fmtTime(displaySecs)}</div>
        <div class="ring-sub" style="color:${SUBJECT_COLORS[state.subject]}">${state.subject}</div>
      </div>
    </div>` : `
    <div class="timer-display">
      <div class="timer-num${state.running?' running':''}" id="timerNum">${fmtTime(displaySecs)}</div>
      <div class="timer-subject" style="color:${SUBJECT_COLORS[state.subject]}">${state.subject}</div>
    </div>`;

  const ctrlBtn = state.running
    ? `<button class="btn-stop" onclick="stopTimer()">⏹ STOP & SAVE</button>`
    : `<button class="btn-start" onclick="startTimer()">▶ START</button>`;

  return `
    <div class="mode-toggle">
      <button class="mode-btn${state.timerMode==='flow'?' active':''}" onclick="setMode('flow')">🌊 Flow (Unlimited)</button>
      <button class="mode-btn${state.timerMode==='countdown'?' active':''}" onclick="setMode('countdown')">⏳ Countdown</button>
    </div>
    <div class="label">Subject</div>
    <div class="subjects gap-16">${subjectPills}</div>
    ${cdInputs}
    ${ringDisplay}
    <div class="controls">
      ${ctrlBtn}
      <button class="btn-reset" onclick="resetTimer()">↺</button>
    </div>
    <div class="card">
      <div class="quick-stats">
        <div class="qs-item">
          <div class="qs-val" style="color:var(--blue)">${fmtHM(todayStat.__total||0)}</div>
          <div class="qs-label">TODAY</div>
        </div>
        <div class="qs-item">
          <div class="qs-val" style="color:var(--maths)">${fmtHM(weekStat.__total||0)}</div>
          <div class="qs-label">WEEK</div>
        </div>
        <div class="qs-item">
          <div class="qs-val" style="color:var(--green)">${fmtHM(lifeStat.__total||0)}</div>
          <div class="qs-label">LIFETIME</div>
        </div>
      </div>
    </div>`;
}

function renderTodo() {
  const subjectOptions = SUBJECTS.map(s => `<option value="${s}">${s}</option>`).join("");
  let sections = "";
  SUBJECTS.forEach(subj => {
    const items = state.todos.filter(t => t.subject === subj);
    if (!items.length) return;
    const color = SUBJECT_COLORS[subj];
    const itemsHtml = items.map(t => `
      <div class="todo-item" style="border-left-color:${t.done?'var(--border)':color}">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${t.id})" style="accent-color:${color}"/>
        <span class="todo-text${t.done?' done':''}">${escHtml(t.text)}</span>
        <button class="todo-del" onclick="deleteTodo(${t.id})">×</button>
      </div>`).join("");
    sections += `<div style="margin-bottom:14px"><div class="todo-section-label" style="color:${color}">${subj}</div>${itemsHtml}</div>`;
  });
  return `
    <div class="todo-input-row">
      <select class="todo-select" id="todoSubj">${subjectOptions}</select>
      <input class="todo-input" id="todoInput" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTodo()"/>
      <button class="todo-add" onclick="addTodo()">+</button>
    </div>
    ${sections || '<div class="empty-state">No tasks yet.<br>Add one above!</div>'}`;
}

function renderBlocker() {
  const on = state.blockActive;
  const appsHtml = BLOCKED_APPS.map(app => {
    const sel = state.blockedApps.includes(app);
    return `<div class="app-item${sel?' selected':''}" onclick="toggleApp('${app}')">
      <span class="app-item-name" style="color:${sel?'var(--red)':'var(--muted)'}">${app}</span>
      <div class="check-box" style="border-color:${sel?'var(--red)':'var(--border)'};background:${sel?'var(--red)':'transparent'}">${sel?'✓':''}</div>
    </div>`;
  }).join("");
  return `
    <div class="blocker-status${on?' on':''}">
      <div class="blocker-icon">${on?'🔒':'🔓'}</div>
      <div class="blocker-title" style="color:${on?'var(--green)':'var(--muted)'}">${on?'BLOCK MODE ON':'BLOCK MODE OFF'}</div>
      <div class="blocker-sub">${on?state.blockedApps.length+' apps selected — stay locked in!':'Select apps below, then activate'}</div>
      <button class="btn-toggle" onclick="toggleBlock()"
        style="background:${on?'#ff6b6b11':'#06d6a011'};border-color:${on?'var(--red)':'var(--green)'};color:${on?'var(--red)':'var(--green)'}">
        ${on?'DEACTIVATE':'ACTIVATE'}
      </button>
    </div>
    <div class="label">Select apps to block</div>
    ${appsHtml}
    ${on && state.blockedApps.length > 0 ? `<div class="notice">⚠️ On your real phone, use <strong>Digital Wellbeing</strong> (Android) to enforce these blocks. This app tracks your selection — activate it there too for full effect!</div>` : ''}`;
}

function renderStats() {
  const blocks = [
    ["TODAY", todayKey()],
    ["THIS WEEK", weekKey()],
    ["THIS YEAR", yearKey()],
    ["LIFETIME", "lifetime"]
  ].map(([label, key]) => {
    const data = state.stats[key] || {};
    const total = data.__total || 0;
    const subjects = Object.entries(data).filter(([k]) => k !== "__total");
    const bars = subjects.map(([subj, secs]) => {
      const pct = total > 0 ? (secs/total*100).toFixed(0) : 0;
      const color = SUBJECT_COLORS[subj] || "#888";
      return `<div class="bar-row">
        <div class="bar-labels">
          <span class="bar-subj" style="color:${color}">${subj}</span>
          <span class="bar-val">${fmtHM(secs)} · ${pct}%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join("");
    return `<div class="stat-block">
      <div class="stat-header">
        <span class="label" style="margin:0">${label}</span>
        <span class="stat-total">${fmtHM(total)}</span>
      </div>
      ${total===0?'<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0;font-family:monospace">No sessions yet</div>':bars}
    </div>`;
  }).join("");

  const recentSessions = state.sessions.slice(0,10).map(s => {
    const color = SUBJECT_COLORS[s.subject] || "#888";
    return `<div class="session-item" style="border-left-color:${color}">
      <div>
        <div class="session-sub" style="color:${color}">${s.subject}</div>
        <div class="session-date">${new Date(s.date).toLocaleString()}</div>
      </div>
      <div class="session-dur">${fmtHM(s.duration)}</div>
    </div>`;
  }).join("") || '<div class="empty-state">No sessions yet</div>';

  return `${blocks}<div class="label">Recent Sessions</div>${recentSessions}`;
}

function escHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── Event Handlers ──────────────────────────────────────────────────────────
function attachEvents() {
  const cdH = document.getElementById("cdH");
  const cdM = document.getElementById("cdM");
  const cdS = document.getElementById("cdS");
  if (cdH) cdH.addEventListener("change", e => { state.cdH = Math.min(23,Math.max(0,parseInt(e.target.value)||0)); });
  if (cdM) cdM.addEventListener("change", e => { state.cdM = Math.min(59,Math.max(0,parseInt(e.target.value)||0)); });
  if (cdS) cdS.addEventListener("change", e => { state.cdS = Math.min(59,Math.max(0,parseInt(e.target.value)||0)); });
}

function setMode(m) {
  if (state.running) return;
  state.timerMode = m; resetTimer();
}
function selectSubject(s) { state.subject = s; if (!state.running) render(); else { document.querySelectorAll(".subject-pill").forEach(el => { const match = el.textContent===s; const c=SUBJECT_COLORS[s]; el.style.borderColor=match?c:"var(--border)"; el.style.background=match?c+"22":"transparent"; el.style.color=match?c:"var(--muted)"; }); } }
function addTodo() {
  const inp = document.getElementById("todoInput");
  const subj = document.getElementById("todoSubj");
  if (!inp || !inp.value.trim()) return;
  state.todos.unshift({ id: Date.now(), text: inp.value.trim(), subject: subj.value, done: false });
  save(); render();
}
function toggleTodo(id) { state.todos = state.todos.map(t => t.id===id?{...t,done:!t.done}:t); save(); render(); }
function deleteTodo(id) { state.todos = state.todos.filter(t => t.id!==id); save(); render(); }
function toggleApp(app) { state.blockedApps = state.blockedApps.includes(app)?state.blockedApps.filter(a=>a!==app):[...state.blockedApps,app]; save(); render(); }
function toggleBlock() { state.blockActive = !state.blockActive; save(); render(); }

// ─── PWA Install ────────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById("install-banner");
  if (banner) banner.classList.add("show");
});
document.getElementById("install-btn").addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById("install-banner").classList.remove("show");
});
document.getElementById("dismiss-btn").addEventListener("click", () => {
  document.getElementById("install-banner").classList.remove("show");
});

// ─── Service Worker ──────────────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

// ─── Boot ────────────────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
